<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — Backblaze Partner Portal</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🔥</div>
      <h1>Partner Portal</h1>
      <p class="text-muted" style="font-size:0.85rem;margin-top:4px">Set New Password</p>
    </div>

    <div id="msg"></div>

    <div id="form-area">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="new-pwd" class="form-input" placeholder="••••••••"
               autocomplete="new-password" minlength="12">
        <div class="form-hint">Minimum 12 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-pwd" class="form-input" placeholder="••••••••"
               autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="submit-btn" style="width:100%">Set Password</button>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('msg').innerHTML =
      '<div class="alert alert-error">Invalid or missing reset token. Please request a new password reset link.</div>';
  }

  document.getElementById('submit-btn')?.addEventListener('click', async () => {
    const pwd     = document.getElementById('new-pwd').value;
    const confirm = document.getElementById('confirm-pwd').value;
    const msgDiv  = document.getElementById('msg');

    if (pwd.length < 12) {
      msgDiv.innerHTML = '<div class="alert alert-error">Password must be at least 12 characters.</div>';
      return;
    }
    if (pwd !== confirm) {
      msgDiv.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    msgDiv.innerHTML = '';

    const res = await fetch('/api/users/complete-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pwd }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      document.getElementById('form-area').style.display = 'none';
      msgDiv.innerHTML = `
        <div class="alert alert-success">
          ✅ Password updated. <a href="/login">Sign in</a>
        </div>`;
    } else {
      msgDiv.innerHTML = `<div class="alert alert-error">${data.detail || 'Failed to reset password. The link may have expired.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Set Password';
    }
  });
</script>
</body>
</html>
